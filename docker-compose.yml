services:

  frontend:
    build:
      context: .
      dockerfile: .docker/prod/frontend.dockerfile
    image: zhdanovaekaterina/menutor:frontend-$$VERSION
    container_name: frontend
    ports:
      - '80:80'
    env_file:
      - .config/.env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: .docker/prod/backend.dockerfile
    image: zhdanovaekaterina/menutor:backend-$$VERSION
    container_name: backend
    ports:
      - '8000:8000'
    env_file:
      - .config/.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:8000/api/ping || exit 1
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:18.3
    container_name: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: pg_isready --dbname=$$POSTGRES_DB --host=127.0.0.1 --port=5432
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 10
    env_file:
      - .config/.env
    restart: unless-stopped

volumes:
  postgres_data:
